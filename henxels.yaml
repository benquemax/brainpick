# henxels.yaml — a whiteboard list of rules. Each bullet is one henxel.
# Change a rule here to change the rules; that's the only way to disobey responsibly.
# yaml-language-server: $schema=./.henxels/henxels.schema.json

# Behaviours (not tests): protections + tuning knobs.
settings:
  confirm_before_push: true       # pushing is Tom's call — block until `henxels bless push`
  confirm_before_deleting:        # losing files / many lines must be deliberate
    over_lines: 5
  warn_about_similar_files:       # nudge when a new file looks like a copy
    above: 0.85
    ignore: ["**/__init__.py"]

henxels:
  - henxel: "The scratch folder survives: _temp/ exists with its .gitkeep"
    in: ./_temp
    required_files: .gitkeep
    why: "Scratch, screenshots and pipeline intermediates go to _temp/ (gitignored), never the repo root."

  - henxel: "Documented claims stay true — codumentation validates before every push"
    run_before_push: "npx --yes codumentation validate"
    why: "Docs here are executable specifications (principle 12); drift fails the push, not the reader."

  # --- the OKF wiki (okf-llm-wiki template) --------------------------------
  # The bundle in docs/ is brainpick's own LLM wiki AND its dogfood corpus.
  # It follows the Open Knowledge Format:
  # https://github.com/GoogleCloudPlatform/knowledge-catalog/blob/main/okf/SPEC.md
  - henxel: "Every concept doc is kebab-case markdown with OKF frontmatter (type is the one MUST)"
    in: ./docs/*
    except: ["**/index.md", "**/log.md", "docs/references/*"]
    allowed_filetypes: .md
    filename_casing: kebab-case
    required_frontmatter: [type, title, description]
    frontmatter_values:
      type: [Concept, Reference, Decision, Playbook]
    why: "One concept per page; the description feeds the generated index and the graph UI."

  - henxel: "timestamp is a real ISO 8601 datetime and is bumped when a doc changes"
    in: ./docs/*
    except: ["**/index.md", "**/log.md", "docs/references/*"]
    frontmatter_dates: { timestamp: datetime }
    bump_updated_on_change: timestamp

  - henxel: "Every link lands — bundle-absolute (/a/b.md) and relative alike"
    in: ./docs/*
    rooted_links_resolve: ./docs
    links_resolve: true

  - henxel: "A concept is a node in the knowledge graph, not an orphan"
    in: ./docs/*
    except: ["**/index.md", "**/log.md", "docs/references/*"]
    min_outbound_links: 1
    why: "Links are the edges of the brain; link text is the target's title."

  - henxel: "OKF reserved files stay frontmatter-free (the bundle root may declare okf_version)"
    in: ["./docs/**/index.md", "./docs/**/log.md"]
    except: ./docs/index.md
    no_frontmatter: true

  - henxel: "Update logs are date-sectioned, newest first"
    in: ./docs/**/log.md
    log_headings_are_dates: true    # custom check, lives in henxels_checks.py

  - henxel: "The bundle root has an index and every top-level concept is listed in it"
    in: ./docs
    except: "**/log.md"
    required_files: index.md
    referenced_in: docs/index.md
    why: "Until brainpick generates the index (principle 4), it is maintained by hand and refereed here."

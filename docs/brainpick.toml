# brainpick.toml — how this wiki is compiled and served (SHARED policy, committed).
# Machine-local model endpoints live in brainpick.local.toml beside this file —
# it deep-merges over this one and stays out of git.
# Delete .brainpick/ any time; `brainpick compile` rebuilds everything.
spec = "0.1"

[modules]
graph = "algorithmic"  # T3: derive the entity graph from the pages themselves
                       # (ghosts + tags + co-occurrence; zero LLM — the default).
                       # "lightrag" opts into LLM extraction via the endpoint in
                       # brainpick.local.toml; "auto" picks lightrag only when an
                       # extraction model is configured there.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: python engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: sync
        working-directory: packages/python
        run: uv sync --extra dev --extra vectors
      - name: ruff
        working-directory: packages/python
        run: uv run ruff check .
      - name: tests (unit + conformance)
        working-directory: packages/python
        # CI-1: python-windows hung a full 6 hours to the job kill on the
        # FIRST public-repo flight (one test between 15-30% never returned).
        # --timeout converts ANY future hang into a named, fast failure with a
        # thread-dump traceback instead of burning the whole job budget again
        # — CI-only (pytest-timeout is a dev dependency, but this flag stays
        # out of the local `henxels _precommit` invocation on purpose: a dev
        # machine under load, or paused at a breakpoint, is not a hang).
        run: uv run pytest -q --timeout=180 --timeout-method=thread

  vectors-local:
    # The offline fastembed fallback ([vectors-local]) is import-guarded and its
    # test skips when the extra is absent (so the matrix job above never pays the
    # heavy onnxruntime + model download). This ubuntu-only leg installs the extra
    # and runs just that test, so the fallback is actually exercised before a release.
    name: vectors-local fallback (fastembed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: sync with the offline-embeddings extra
        working-directory: packages/python
        run: uv sync --extra dev --extra vectors-local
      - name: exercise the fastembed embedder (downloads bge-small once)
        working-directory: packages/python
        run: uv run pytest -q -k fastembed

  node:
    name: node engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npx tsc --noEmit -p packages/node
      - name: tests (unit + conformance, zero skips)
        run: npm test -w packages/node
      - name: build
        run: npm run build -w packages/node

  vectors-local-node:
    # The in-process local embedder (spec/30 rung 5, kind = "local") is
    # import-guarded like @lancedb/lancedb, but unlike that optionalDependency
    # its real-inference test also downloads ONNX weights — too heavy for the
    # matrix job above on every push. This ubuntu-only leg opts in with
    # BRAINPICK_TEST_LOCAL_EMBED, the Node peer of the vectors-local job above.
    name: vectors-local fallback (transformers.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: exercise the local embedder (downloads nomic-embed-text-v1.5 once)
        run: npm test -w packages/node -- test/embed.test.ts -t "local embedder"
        env:
          BRAINPICK_TEST_LOCAL_EMBED: "1"

  webui:
    name: web ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: typecheck
        working-directory: packages/webui
        run: npx tsc --noEmit
      - name: tests
        run: npm test -w packages/webui
      - name: build (with PWA assets)
        run: npm run build -w packages/webui

  webui-e2e:
    name: web ui e2e (real python engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # CI-1 (evidence: run 29125813729): the FIRST test failed — .hud-tiers
      # stuck on "t2 off" for the mock-embedder bundle (global-setup.ts writes
      # `[models.embedding] kind = "mock"` on purpose). Root cause, confirmed
      # against t2.py's own t2_gate(): T2 needs BOTH a configured embedder AND
      # an importable lancedb, mock embedder or not — this step synced without
      # `--extra vectors` (unlike the `python` job above), so lancedb was never
      # installed and T2 stayed off no matter how long the test waited.
      - name: sync python engine
        working-directory: packages/python
        run: uv sync --extra vectors
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: playwright against brainpick serve
        run: npm run e2e -w packages/webui
      - name: upload spawned-engine logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webui-e2e-engine-logs
          path: packages/webui/test-results/engine-logs
          if-no-files-found: ignore

  docs-truth:
    name: documented claims hold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx codumentation validate
      - uses: astral-sh/setup-uv@v5
      - name: henxels contract holds
        run: |
          uv tool install henxels
          henxels check --all
      - name: docs wiki index is committed-fresh
        # Compile T1 from a clean checkout (no embedding/extraction endpoints in
        # CI, so t2/t3 stay off — pure, fast, deterministic), then fail if the
        # regenerated generated-index block differs from what was committed.
        run: |
          cd packages/python && uv sync && uv run brainpick compile --root ../../docs
          cd ../.. && git diff --exit-code docs/index.md

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "brainpick"
version = "0.1.0"
description = "A turn-key brain stack for agents: compile an OKF markdown bundle into a queryable, servable, visualizable brain."
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "PyYAML>=6",
    "tomli>=2; python_version<'3.11'",
    "mcp>=1.9,<2",
    "starlette>=0.40",
    "uvicorn>=0.30",
    "watchfiles>=0.24",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.6",
]
vectors = [
    "lancedb>=0.25",
]
vectors-local = [
    "fastembed>=0.7",
]
all = [
    "brainpick[vectors,vectors-local]",
]

[project.scripts]
brainpick = "brainpick.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
brainpick = ["_static/**/*", "_skill/SKILL.md"]

[tool.ruff]
line-length = 110

[tool.pytest.ini_options]
testpaths = ["tests"]

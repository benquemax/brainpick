# Language-agnostic conformance cases. Each engine's harness reads this file
# and runs every case against the shared fixtures. Adding a case here
# tightens both engines at once — behavior changes land HERE first.

version: "0.1"

cases:
  # class: compile — copy the fixture bundle to a temp dir, run a full
  # compile with default config, byte-compare each listed artifact against
  # fixtures/expected/<bundle>/ (manifest compared after normalizing the
  # volatile fields named in spec/10-manifest.md).
  - id: compile-kotiaurinko-t1
    class: compile
    bundle: kotiaurinko
    artifacts:
      - .brainpick/manifest.json
      - .brainpick/t1/graph.json
      - .brainpick/t1/docs.jsonl
      - index.md            # the generated section, in the bundle itself

  # class: compile-idempotent — compile the fixture twice; the second run
  # must be a no-op: identical artifacts, unchanged seq.
  - id: compile-kotiaurinko-idempotent
    class: compile-idempotent
    bundle: kotiaurinko

  # class: check-fresh — after a compile, --check-fresh exits 0; after
  # mutating the named file, it exits 1.
  - id: check-fresh-kotiaurinko
    class: check-fresh
    bundle: kotiaurinko
    mutate: kuu.md

  # class: chunks — build the normative T2 chunk set (spec/30 chunker) from
  # the bundle and byte-compare its canonical JSONL against the golden.
  - id: chunks-kotiaurinko
    class: chunks
    bundle: kotiaurinko
    artifact: t2/chunks.jsonl

  # class: query — run searches against the compiled fixture and assert the
  # top-k result SET (order-insensitive, scores ignored). Cases with
  # `embedder: mock` compile T2 with the normative mock embedder (spec/30)
  # first: chunker → vectors → store → retrieval → router, end to end.
  - id: search-keyword-aurinko
    class: query
    bundle: kotiaurinko
    query: "aurinko"
    mode: keyword
    limit: 8
    expect_paths: [aurinko.md, komeetta.md, planeetat.md, yksinainen.md]

  - id: search-semantic-kuu-vuorovesi
    class: query
    bundle: kotiaurinko
    query: "kuu vuorovesi maa"
    mode: semantic
    embedder: mock
    limit: 4
    # Reviewed: kuu/planeetat/maa are the moon–tides–earth neighborhood (their
    # bodies cross-link kuu and maa); yksinainen is the mock's 16-bucket hash
    # tail — and what separates chunk-vector recall from BM25 (which ranks
    # aurinko.md fourth instead).
    expect_paths: [kuu.md, planeetat.md, maa.md, yksinainen.md]

  - id: search-semantic-title-komeetta
    class: query
    bundle: kotiaurinko
    query: "komeetta"
    mode: semantic
    embedder: mock
    limit: 4
    # Reviewed: "komeetta" IS the title of komeetta.md, yet the mock vector
    # neighbourhood (maa/aurinko/yksinainen/kuu) MISSES it — a real short-title miss.
    # The title-match guarantee injects the named page so typing an article's name
    # always returns it, in semantic too; kuu.md (the vector tail's 4th) drops at the
    # limit. A pure-vector engine returns the neighbourhood without komeetta and fails.
    expect_paths: [komeetta.md, maa.md, aurinko.md, yksinainen.md]

  - id: search-auto-aurinko-fused
    class: query
    bundle: kotiaurinko
    query: "aurinko"
    mode: auto
    embedder: mock
    limit: 8
    # Reviewed: keyword alone finds only the 4 docs whose text says "aurinko";
    # RRF fusion widens recall to every doc of this sun-centered bundle, so the
    # fused set proves semantic ranking actually joined (a keyword-only engine
    # returns 4 paths and fails).
    expect_paths: [aurinko.md, komeetta.md, kuu.md, maa.md, planeetat.md,
                   saaret/atolli.md, saaret/laguuni.md, yksinainen.md]

  # class: delta — apply scripted mutations to a compiled fixture, recompile
  # after each step, and compare emitted graph.delta payloads against the
  # scenario's expected-deltas.jsonl (seq-relative).
  - id: live-edit-01
    class: delta
    bundle: kotiaurinko
    scenario: live-edit-01

  # class: report — render the opt-in AGENTS.md brain report block (spec/20) from
  # the compiled fixture (bundle_root ".") and byte-compare it against the golden.
  # The block is what `brainpick integrate agents-md` installs and every compile
  # refreshes; the golden holds exactly the rendered block plus a trailing LF.
  - id: report-kotiaurinko
    class: report
    bundle: kotiaurinko
    artifact: agents-report.md

  # class: kg-algorithmic — the T3 algorithmic BACKEND (spec/40). Compile the
  # bundle with the default config (graph = "algorithmic") and byte-compare the
  # produced export against goldens: the derivation is exact and normative, so
  # both engines produce identical bytes NATIVELY (no delegation, zero skips).
  # kotiaurinko carries one ghost (olematon) and eight tags — a non-empty graph.
  - id: kg-algorithmic-kotiaurinko
    class: kg-algorithmic
    bundle: kotiaurinko
    artifacts:
      - .brainpick/t3/entities.jsonl
      - .brainpick/t3/relations.jsonl
      - .brainpick/t3/kg-meta.json

  # class: kg-query — the T3 CONSUMER (spec/40). The harness compiles the bundle,
  # stages the hand-authored export from fixtures/expected/<bundle>/t3/ into the
  # compiled .brainpick/t3/ (the extractor is never invoked in conformance), then
  # asserts the document SET returned by the normative reader. op=neighbors walks
  # brain_neighbors layer=entities from `doc` to `depth` and takes the union of the
  # source_docs grounding the reached entities; op=search runs mode=graph and takes
  # the ranked hit paths at `limit`.
  - id: kg-neighbors-kuu-entities
    class: kg-query
    bundle: kotiaurinko
    op: neighbors
    doc: kuu.md
    depth: 1
    # Reviewed: kuu.md is grounded by kuu/maa/vuorovesi (distance 0); one relation
    # hop reaches planeetat (maa belongs to the worlds). The union of those four
    # entities' source_docs is the entity-layer neighborhood — a set no T1 link
    # walk produces, so a links-degraded engine (entity nodes absent) fails here.
    expect_paths: [aurinko.md, kuu.md, maa.md, planeetat.md]

  - id: kg-graph-orbits-star
    class: kg-query
    bundle: kotiaurinko
    op: search
    query: "what orbits the star"
    limit: 4
    # Reviewed: the entity graph ranks the star (aurinko) and everything that orbits
    # it — komeetta and the worlds (planeetat), and maa which belongs to the worlds.
    # kuu (the moon orbits the earth, NOT the star) ranks last and is excluded at 4.
    # A keyword engine returns the islands here instead (komeetta.md is its LAST hit),
    # so matching this set proves the graph retriever actually ran.
    expect_paths: [aurinko.md, komeetta.md, maa.md, planeetat.md]

  - id: kg-graph-vuorovesi-expands
    class: kg-query
    bundle: kotiaurinko
    op: search
    query: "vuorovesi"
    limit: 8
    # Reviewed: no document body contains "vuorovesi" (keyword returns EMPTY), yet
    # the entity grounds kuu.md and one hop over the tide→moon relation reaches the
    # moon's docs. The set proves both the export read and the one-hop expansion.
    expect_paths: [aurinko.md, kuu.md, maa.md]
